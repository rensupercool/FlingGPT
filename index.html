<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Chat Assistant</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap');

  :root {
    --bg: #05060a;
    --surface: #0c0d18;
    --border: #1b1d32;
    --accent: #5b8cff;
    --accent-soft: rgba(91, 140, 255, 0.14);
    --accent2: #f5b567;
    --text: #f5f5ff;
    --muted: #7f8295;
    --user-bubble: #131528;
    --ai-bubble: #101222;
    --radius-lg: 18px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }

  body {
    background: radial-gradient(circle at top, #111827 0, #020617 55%);
    color: var(--text);
    font-family: 'Space Grotesk', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  .noise-overlay {
    position: fixed;
    inset: 0;
    pointer-events: none;
    opacity: 0.16;
    mix-blend-mode: soft-light;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 1600 900' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='1.2' numOctaves='2' stitchTiles='noStitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.28'/%3E%3C/svg%3E");
    z-index: 0;
  }

  nav {
    display: flex;
    align-items: center;
    padding: 0 24px;
    height: 60px;
    border-bottom: 1px solid var(--border);
    background: rgba(5, 6, 14, 0.96);
    backdrop-filter: blur(18px);
    -webkit-backdrop-filter: blur(18px);
    z-index: 10;
  }

  .nav-logo {
    font-weight: 700;
    font-size: 20px;
    letter-spacing: 1px;
    color: #f5f5ff;
  }

  .nav-status {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 1px;
  }

  .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: #2ecc71;
    animation: blink 2s infinite;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.2; }
  }

  .chat-container {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    position: relative;
    z-index: 10;
  }

  .chat-messages {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 18px;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }

  .chat-messages::-webkit-scrollbar { width: 3px; }
  .chat-messages::-webkit-scrollbar-thumb { background: var(--border); }

  .welcome {
    margin: auto;
    text-align: center;
    padding: 32px 24px;
    max-width: 480px;
    background: var(--surface);
    border-radius: var(--radius-lg);
    border: 1px solid var(--border);
  }

  .welcome-logo {
    font-size: 28px;
    font-weight: 700;
    color: #ffffff;
    margin-bottom: 6px;
  }

  .welcome-sub {
    font-size: 13px;
    color: var(--muted);
    line-height: 1.5;
  }

  .msg {
    display: flex;
    flex-direction: column;
    max-width: 80%;
    animation: msgIn 0.18s ease;
  }

  @keyframes msgIn {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .msg.user { align-self: flex-end; align-items: flex-end; }
  .msg.ai { align-self: flex-start; align-items: flex-start; }

  .msg-who {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 1px;
    margin-bottom: 4px;
  }

  .msg.user .msg-who { color: var(--accent2); }
  .msg.ai .msg-who { color: var(--accent); }

  .bubble {
    padding: 12px 16px;
    font-size: 14px;
    line-height: 1.6;
    border-radius: 14px;
    border: 1px solid var(--border);
  }

  .msg.user .bubble {
    background: var(--user-bubble);
    border-color: #22253a;
  }

  .msg.ai .bubble {
    background: var(--ai-bubble);
    border-left: 2px solid var(--accent);
  }

  .typing-dots {
    display: flex;
    gap: 4px;
    padding: 10px 14px;
    background: #101222;
    border-radius: 10px;
    border: 1px solid var(--border);
    border-left: 2px solid var(--accent);
    width: fit-content;
  }

  .typing-dots span {
    width: 6px; height: 6px;
    background: var(--accent);
    border-radius: 50%;
    opacity: 0.5;
    animation: tdot 1.2s infinite;
  }

  .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
  .typing-dots span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes tdot {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.5; }
    30% { transform: translateY(-5px); opacity: 1; }
  }

  .input-area {
    border-top: 1px solid var(--border);
    background: #05060c;
    padding: 16px 24px;
  }

  .input-row {
    display: flex;
    gap: 12px;
    align-items: flex-end;
    max-width: 900px;
    margin: 0 auto;
    width: 100%;
  }

  textarea {
    flex: 1;
    background: #05060c;
    border: 1px solid var(--border);
    color: var(--text);
    font-size: 14px;
    padding: 12px;
    resize: none;
    outline: none;
    line-height: 1.5;
    min-height: 46px;
    max-height: 140px;
    transition: border-color 0.15s ease, background 0.15s ease;
    border-radius: 10px;
  }

  textarea:focus {
    border-color: var(--accent);
    background: #080a14;
  }
  textarea::placeholder { color: var(--muted); }

  .send {
    background: var(--accent);
    border: none;
    color: #05060a;
    font-weight: 600;
    font-size: 14px;
    padding: 0 24px;
    height: 46px;
    cursor: pointer;
    transition: background 0.15s ease, transform 0.1s ease;
    white-space: nowrap;
    border-radius: 10px;
  }

  .send:hover {
    background: #527fe3;
  }

  .send:disabled {
    background: #1a1c2a;
    color: var(--muted);
    cursor: not-allowed;
  }
</style>
</head>
<body>

<div class="noise-overlay"></div>

<nav>
  <div class="nav-logo">AI Assistant</div>
  <div class="nav-status">
    <div class="dot"></div>
    <span>CONNECTED</span>
  </div>
</nav>

<div class="chat-container">
  <div class="chat-messages" id="chatMessages">
    <div class="welcome" id="welcomeBox">
      <div class="welcome-logo">How can I help you today?</div>
      <div class="welcome-sub">Ask any question, brainstorm ideas, or just chat with the AI assistant.</div>
    </div>
  </div>

  <div class="input-area">
    <div class="input-row">
      <textarea id="userInput" placeholder="Type a message..." rows="1" onkeydown="handleKey(event)"></textarea>
      <button class="send" id="sendBtn" onclick="sendMessage()">Send</button>
    </div>
  </div>
</div>

<script>
const CONFIG = {
  endpoint: "https://api.blackbox.ai/v1/chat/completions",
  model: "blackboxai/anthropic/claude-fable-5",
  apiKey: "sk-proj-S6hK4R8P1mLoG5jY3tW2B9qF7nX5v8c2D1e0Z4r3x7t9U0Q"
};

let messages = [
  { role: "system", content: "You are a helpful, direct, and intelligent AI assistant." }
];

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function addMsg(sender, text) {
  const container = document.getElementById('chatMessages');
  const msgDiv = document.createElement('div');
  msgDiv.className = `msg ${sender}`;
  
  const who = document.createElement('div');
  who.className = 'msg-who';
  who.innerText = sender === 'user' ? 'YOU' : 'AI';
  
  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.innerHTML = text.replace(/\n/g, '<br>').replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
  
  msgDiv.appendChild(who);
  msgDiv.appendChild(bubble);
  container.appendChild(msgDiv);
  
  container.scrollTop = container.scrollHeight;
}

function showTyping() {
  const container = document.getElementById('chatMessages');
  const tDiv = document.createElement('div');
  tDiv.id = 'typingBubble';
  tDiv.className = 'msg ai';
  tDiv.innerHTML = '<div class="msg-who">AI</div><div class="typing-dots"><span></span><span></span><span></span></div>';
  container.appendChild(tDiv);
  container.scrollTop = container.scrollHeight;
}

function removeTyping() {
  const el = document.getElementById('typingBubble');
  if (el) el.remove();
}

async function sendMessage() {
  const input = document.getElementById('userInput');
  const text = input.value.trim();
  if (!text) return;
  
  const welcome = document.getElementById('welcomeBox');
  if (welcome) welcome.remove();
  
  addMsg('user', text);
  input.value = '';
  showTyping();
  
  const btn = document.getElementById('sendBtn');
  btn.disabled = true;

  messages.push({ role: "user", content: text });
  
  try {
    const response = await fetch(CONFIG.endpoint, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": `Bearer ${CONFIG.apiKey}`
      },
      body: JSON.stringify({
        model: CONFIG.model,
        messages: messages
      })
    });
    
    removeTyping();
    const data = await response.json();
    
    if (data.choices && data.choices[0] && data.choices[0].message) {
      const reply = data.choices[0].message.content;
      messages.push({ role: "assistant", content: reply });
      addMsg('ai', reply);
    } else {
      addMsg('ai', 'Error generating response. Please check account setup configurations.');
    }
  } catch (err) {
    removeTyping();
    addMsg('ai', 'Something went wrong, check your connection');
  }
  btn.disabled = false;
  input.focus();
}
</script>
</body>
</html>
